<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
</head>
<body>
    <header>
        <span>POMO</span>
        <button>Settings</button>
    </header>
    <main>
        <span id="mode-badge">Focus</span>

        <p id="countdown">25:00</p>
        <p id="status-label">READY</p>
        <div id="controls">
            <button id="start-btn">START</button>
            <button id="pause-btn">PAUSE</button>
            <button id="reset-btn">RESET</button>
        </div>
    </main>
    <section id="history">
        <h2>Today's Sessions</h2>
        <ul id="history-list">
            <li>No Seesion yet</li>
        </ul>
    </section>
    <div id="settings-modal" class="hidden">
        <div id="settings-card">
            <h3>Settings</h3>

            <label>Focus(minutes)
                <input type="number" id="focus-input" value="25" min="1" max="120"/>
            </label>

            <label>Break (minutes)
                <input type="number" id="break-input" value="5" min="1" max="30" />
            </label>

            <button id="apply-btn">APPLY</button>
            <button id="cancel-btn">DISCARD CHANGES</button>
        </div>
    </div>
</body>
</html>
